<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo__artcloud.png" />
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#06b6d4" />
    <title>ArtCloud - Telegram MiniApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      /* Scrollbar - все браузеры */
      html {
        scrollbar-width: thin;
        scrollbar-color: #06b6d4 #94a3b8;
      }
      
      /* Chrome, Safari, Edge */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #94a3b8; }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 4px;
        border: 2px solid #94a3b8;
      }
      ::-webkit-scrollbar-thumb:hover { background: #06b6d4; border-color: #06b6d4; }
      ::-webkit-scrollbar-thumb:active { background: #06b6d4; border-color: #06b6d4; }
      
      /* Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: #06b6d4 #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
